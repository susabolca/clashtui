providers:
  - id: deepseek
    label: DeepSeek
    base_url: https://api.deepseek.com
    api_key: ""
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-v4-flash
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro
      - deepseek-chat
      - deepseek-reasoner
    note: DeepSeek official OpenAI-compatible endpoint.

  - id: kimi-platform
    label: Kimi Platform
    base_url: https://api.moonshot.cn/v1
    api_key: ""
    api_key_env: MOONSHOT_API_KEY
    default_model: kimi-k2.6
    models:
      - kimi-k2.6
      - kimi-k2.5
    note: Pay-as-you-go Kimi API. Do not use Kimi Code keys here.

  - id: kimi-code
    label: Kimi Code Plan
    base_url: https://api.kimi.com/coding/v1
    api_key: ""
    api_key_env: KIMI_CODE_API_KEY
    default_model: kimi-for-coding
    models:
      - kimi-for-coding
    note: Kimi membership/coding quota endpoint. Keys are separate from Kimi Platform.

  - id: dashscope-cn
    label: Qwen DashScope CN
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ""
    api_key_env: DASHSCOPE_API_KEY
    default_model: qwen-plus
    models:
      - qwen-plus
      - qwen-turbo
      - qwen-flash
      - qwen-max
      - qwen-long
      - qwen3.5-plus
      - qwen3.5-flash
      - qwen3.5-coder-plus
      - qwen3-coder-plus
      - qwen3-coder-flash
    note: Alibaba Model Studio pay-as-you-go endpoint for China mainland.

  - id: dashscope-intl
    label: Qwen DashScope Intl
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key: ""
    api_key_env: DASHSCOPE_API_KEY
    default_model: qwen-plus
    models:
      - qwen-plus
      - qwen-turbo
      - qwen-flash
      - qwen-max
    note: Alibaba Model Studio international/Singapore endpoint.

  - id: dashscope-coding
    label: Qwen Coding Plan
    base_url: https://coding.dashscope.aliyuncs.com/v1
    api_key: ""
    api_key_env: DASHSCOPE_CODING_API_KEY
    default_model: qwen3.5-plus
    models:
      - qwen3.5-plus
      - qwen3.5-flash
      - qwen3-max-2026-01-23
      - qwen3-coder-next
      - qwen3-coder-plus
      - kimi-k2.5
      - glm-5
      - glm-4.7
      - MiniMax-M2.5
    note: Alibaba Coding Plan endpoint. Uses sk-sp keys and subscription quota.

  - id: tencent-tokenhub
    label: Tencent TokenHub
    base_url: https://tokenhub.tencentmaas.com/v1
    api_key: ""
    api_key_env: TOKENHUB_API_KEY
    default_model: deepseek-v4-flash
    models:
      - hy3-preview
      - hunyuan-2.0-thinking-20251109
      - hunyuan-2.0-instruct-20251111
      - hunyuan-role-latest
      - deepseek-v4-flash
      - deepseek-v4-pro
      - deepseek-v3.2
      - deepseek-v3.1-terminus
      - deepseek-r1-0528
      - deepseek-v3-0324
      - glm-5.1
      - glm-5v-turbo
      - glm-5-turbo
      - glm-5
      - kimi-k2.6
      - kimi-k2.5
      - minimax-m2.7
      - minimax-m2.5
    note: Tencent TokenHub unified endpoint for newer model services.

  - id: tencent-hunyuan
    label: Tencent Hunyuan
    base_url: https://api.hunyuan.cloud.tencent.com/v1
    api_key: ""
    api_key_env: HUNYUAN_API_KEY
    default_model: hunyuan-turbos-latest
    models:
      - hunyuan-turbos-latest
      - hunyuan-turbo
      - hunyuan-lite
      - hunyuan-standard
    note: Legacy Hunyuan OpenAI-compatible endpoint; new services migrate to TokenHub.

  - id: volcengine-ark
    label: Volcengine Ark
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key: ""
    api_key_env: ARK_API_KEY
    default_model: doubao-seed-1-6-251015
    models:
      - doubao-seed-1-6-251015
      - doubao-seed-1-6-thinking-250715
      - doubao-seed-1-6-flash-250715
      - doubao-seed-code
      - doubao-seed-2.0-code
      - doubao-seed-2.0-pro
      - doubao-seed-2.0-lite
    note: Volcengine Ark pay-as-you-go endpoint. Some accounts may require endpoint service IDs.

  - id: volcengine-coding
    label: Ark Coding Plan
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: ""
    api_key_env: ARK_CODING_API_KEY
    default_model: ark-code-latest
    models:
      - ark-code-latest
      - doubao-seed-code
      - doubao-seed-2.0-code
      - doubao-seed-2.0-pro
      - doubao-seed-2.0-lite
      - kimi-k2.5
      - glm-4.7
      - deepseek-v3.2
      - MiniMax-M2.5
    note: Volcengine Coding Plan endpoint. Keep it separate from the normal Ark API.

  - id: qianfan
    label: Baidu Qianfan
    base_url: https://qianfan.baidubce.com/v2
    api_key: ""
    api_key_env: QIANFAN_API_KEY
    default_model: ernie-4.0-turbo-8k
    models:
      - ernie-4.0-turbo-8k
      - ernie-4.5-turbo-20260402
      - deepseek-v3.2
      - deepseek-v4-flash
      - glm-5.1
    note: Baidu Qianfan normal OpenAI-compatible endpoint.

  - id: qianfan-coding
    label: Qianfan Coding Plan
    base_url: https://qianfan.baidubce.com/v2/coding
    api_key: ""
    api_key_env: QIANFAN_CODING_API_KEY
    default_model: qianfan-code-latest
    models:
      - qianfan-code-latest
      - kimi-k2.5
      - deepseek-v3.2
      - glm-5
      - minimax-m2.5
      - ernie-4.5-turbo-20260402
      - deepseek-v4-flash
      - glm-5.1
    note: Baidu Coding Plan endpoint. Uses dedicated Coding Plan keys.

  - id: bigmodel
    label: GLM BigModel
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ""
    api_key_env: BIGMODEL_API_KEY
    default_model: glm-5.1
    models:
      - glm-5.1
      - glm-5
      - glm-5-turbo
      - glm-4.7
      - glm-4.5-air
      - glm-4.5v
    note: Zhipu/GLM normal API endpoint for China mainland.

  - id: bigmodel-coding
    label: GLM Coding Plan
    base_url: https://open.bigmodel.cn/api/coding/paas/v4
    api_key: ""
    api_key_env: BIGMODEL_CODING_API_KEY
    default_model: GLM-5.1
    models:
      - GLM-5.1
      - GLM-4.7
      - GLM-4.5-air
    note: GLM Coding Plan endpoint; do not mix with the normal API endpoint.

  - id: minimax-cn
    label: MiniMax CN
    base_url: https://api.minimaxi.com/v1
    api_key: ""
    api_key_env: MINIMAX_API_KEY
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7
      - MiniMax-M2.7-highspeed
      - MiniMax-M2.5
      - MiniMax-M2.5-highspeed
      - MiniMax-M2.1
      - MiniMax-M2.1-highspeed
      - MiniMax-M2
    note: MiniMax China OpenAI-compatible endpoint.

  - id: minimax-token-plan
    label: MiniMax Token Plan
    base_url: https://api.minimaxi.com/v1
    api_key: ""
    api_key_env: MINIMAX_TOKEN_PLAN_API_KEY
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7
      - MiniMax-M2.7-highspeed
      - codex-MiniMax-M2.7
      - MiniMax-M2.5
      - MiniMax-M2.5-highspeed
      - MiniMax-M2.1
      - MiniMax-M2.1-highspeed
      - MiniMax-M2
    note: MiniMax Token Plan uses separate sk-cp keys; endpoint is still OpenAI-compatible.

  - id: siliconflow
    label: SiliconFlow
    base_url: https://api.siliconflow.cn/v1
    api_key: ""
    api_key_env: SILICONFLOW_API_KEY
    default_model: Qwen/QwQ-32B
    models:
      - Qwen/QwQ-32B
      - Qwen/Qwen2.5-7B-Instruct
      - deepseek-ai/DeepSeek-V3
      - deepseek-ai/DeepSeek-R1
      - deepseek-ai/DeepSeek-V2.5
    note: SiliconFlow OpenAI-compatible endpoint; model names include vendor prefixes.

  - id: openai
    label: OpenAI
    base_url: https://api.openai.com/v1
    api_key: ""
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4o-mini
    models:
      - gpt-4o-mini
      - gpt-4o
      - o4-mini
    note: Official OpenAI Chat Completions endpoint.

  - id: openai-compatible
    label: OpenAI Compatible
    base_url: ""
    api_key: ""
    api_key_env: CLASHTUI_LLM_API_KEY
    default_model: ""
    models: []
    note: Custom compatible endpoint. Configure base URL and model manually.

  - id: local
    label: Local OpenAI-Compatible
    base_url: http://127.0.0.1:11434/v1
    api_key: ""
    api_key_env: CLASHTUI_LLM_API_KEY
    default_model: qwen2.5-coder:7b
    models:
      - qwen2.5-coder:7b
      - qwen3:8b
      - deepseek-r1:8b
      - llama3.1:8b
    note: Local compatible server such as Ollama or llama.cpp; adjust model as installed.
